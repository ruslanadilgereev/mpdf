name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Generate demo
        run: python create_demo.py

      - name: Validate test.mpdf
        run: python mpdf-validate.py test.mpdf

      - name: Validate all examples
        run: python mpdf-validate.py examples/*.mpdf

      - name: Test CLI
        run: |
          mpdf validate test.mpdf
          mpdf validate examples/minimal.mpdf
